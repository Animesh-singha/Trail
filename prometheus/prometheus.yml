global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules configuration
rule_files:
  - "rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # 1. Monitor the VPS Infrastructure
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # 2. Monitor the AI Hub (Nexus Hub)
  - job_name: 'nexus-hub'
    static_configs:
      - targets: ['nexus-hub:3111']

  # 3. Monitor External Websites (Blackbox)
  - job_name: 'uptime-monitoring'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://yoforex.net
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 5. Monitor Database (Postgres Exporter)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'pm2-exporter'
    static_configs:
      - targets: ['pm2-exporter:9209']
