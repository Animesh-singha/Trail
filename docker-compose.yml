services:
  # --- SOC INTERNAL DATA STORE ---
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=YoForex@101
      - POSTGRES_DB=nexus_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-net

  redis:
    image: redis:alpine
    restart: unless-stopped
    network_mode: host # FIXED: Move to host mode for seamless Hub access

  # --- MONITORING CORE LAYER (Host Mode for Raw Access) ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml
      - ./prometheus/targets.json:/etc/prometheus/targets.json:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ./monitoring/metrics:/etc/node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/etc/node-exporter'

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml

  # --- DATABASE METRICS ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://nexus_user:YoForex@101@localhost:5433/nexus_db?sslmode=disable
    network_mode: host

  # --- INTELLIGENCE LAYER ---
  nexus-hub:
    build: 
      context: ./ai-analyzer
    restart: unless-stopped
    ports:
      - "3111:3111"
    volumes:
      - ./ai-analyzer:/app
      - /app/node_modules
    environment:
      - PORT=3111
      - DB_HOST=localhost
      - DB_USER=nexus_user
      - DB_PASSWORD=YoForex@101
      - DB_NAME=nexus_db
      - REDIS_URL=redis://localhost:6379
    network_mode: host

  # --- VISUALIZATION LAYER ---
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: trail-nginx-exporter
    command:
      - -nginx.scrape-uri=http://localhost:80/nginx_status
    network_mode: host
    restart: always

  nexus-dashboard:
    build:
      context: ./dashboard
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
      - /home/ubuntu/.pm2:/root/.pm2:ro # ADDED: Give Dashboard eyes to see bot logs
    environment:
      - PORT=3200
      - NEXT_PUBLIC_API_URL=http://localhost:3111
      - NEXT_PUBLIC_AI_HUB_URL=http://localhost:3111
      - NEXT_PUBLIC_PROMETHEUS_URL=http://localhost:9090
      - PROMETHEUS_URL=http://localhost:9090
      - PM2_LOG_PATH=/root/.pm2/logs # Path inside container

  # --- PM2 DISCOVERY AGENT ---
  pm2-exporter:
    build: ./pm2-exporter
    container_name: trail-pm2-exporter-1
    restart: unless-stopped
    network_mode: host
    pid: "host"
    environment:
      - PM2_HOME=/root/.pm2
    volumes:
      - /home/ubuntu/.pm2:/root/.pm2:ro

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
