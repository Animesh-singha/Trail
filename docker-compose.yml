services:
  # --- SOC INTERNAL DATA STORE (Isolated from your real websites) ---
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=YoForex@101
      - POSTGRES_DB=nexus_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-net


  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - nexus-net

  # --- MONITORING CORE LAYER ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - nexus-net

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - nexus-net

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ./monitoring/metrics:/etc/node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/etc/node-exporter'
    ports:
      - "9100:9100"
    networks:
      - nexus-net

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"
    networks:
      - nexus-net


  # --- DATABASE METRICS (Real data for Postgres) ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://nexus_user:YoForex@101@postgres:5432/nexus_db?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - nexus-net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=singhaanimesh216@gmail.com
      - GF_SECURITY_ADMIN_PASSWORD=1234qwer # Change this later via the Grafana UI (Profile -> Change Password)
    ports:
      - "3110:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - nexus-net

  # --- INTELLIGENCE LAYER ---
  nexus-hub:
    build: 
      context: ./ai-analyzer
    restart: unless-stopped
    ports:
      - "3111:3111"
    volumes:
      - ./ai-analyzer:/app
      - /app/node_modules
    environment:
      - PORT=3111
      - DB_HOST=postgres
      - DB_USER=nexus_user
      - DB_PASSWORD=YoForex@101
      - DB_NAME=nexus_db
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - nexus-net

  # --- VISUALIZATION LAYER ---
  nexus-dashboard:
    build:
      context: ./dashboard
      args:
        - NEXT_PUBLIC_API_URL=http://37.187.159.136:3111
        - NEXT_PUBLIC_AI_HUB_URL=http://37.187.159.136:3111
    restart: unless-stopped
    ports:
      - "3200:3000" # Safe port mapped from 3000 to 3200
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://37.187.159.136:3111
      - NEXT_PUBLIC_AI_HUB_URL=http://37.187.159.136:3111
      - NEXT_PUBLIC_PROMETHEUS_URL=http://37.187.159.136:9090
      - PROMETHEUS_URL=http://prometheus:9090
    networks:
      - nexus-net

  # --- PM2 DISCOVERY AGENT (Auto-detects your backend apps) ---
  pm2-exporter:
    build: ./pm2-exporter
    container_name: trail-pm2-exporter-1
    restart: unless-stopped
    pid: "host" # Crucial: Allows seeing all host processes
    environment:
      - PM2_HOME=/root/.pm2
    ports:
      - "9209:9209"
    volumes:
      - /home/ubuntu/.pm2:/root/.pm2:ro
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
