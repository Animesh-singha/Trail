modules:
  http_2xx:
    prober: http
    timeout: 15s
    http:
      preferred_ip_protocol: "ip4"
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      # Consider any standard response as "Alive"
      valid_status_codes: [200, 201, 202, 204, 301, 302, 401, 403, 405]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: true
